<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Movie Catalog</h1>
    <div class="controls">
      <input id="q" type="search" placeholder="Search titles..." autocomplete="off">
      <span id="count" class="count"></span>
    </div>
    <div id="meta" class="meta"></div>
  </header>

  <main>
    <table>
      <thead>
        <tr>
          <th data-key="title" class="sortable">Title</th>
          <th data-key="year" class="sortable">Year</th>
          <th data-key="runtime_seconds" class="sortable">Runtime</th>
          <th data-key="genres">Genres</th>
          <th data-key="date_added" class="sortable">Added</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5" class="loading">Loading...</td></tr>
      </tbody>
    </table>
  </main>

  <footer>
    <p>Generated by <a href="https://github.com/ghill11/jellyfin-movie-catalog">jellyfin-movie-catalog</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
